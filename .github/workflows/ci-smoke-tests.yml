name: CI Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    name: Run smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Run smoke tests
        run: uv run python -m pytest tests/quality -v

  bundle-validate:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate bundle YAML structure
        # databricks bundle validate requires live workspace auth even for
        # schema-only checks — not viable in shared CI without credentials.
        # This step validates that databricks.yml is well-formed YAML and
        # contains the required bundle sections. No CLI or network call needed.
        run: |
          python3 - <<'EOF'
          import yaml, sys

          with open("databricks.yml") as f:
              cfg = yaml.safe_load(f)

          errors = []
          if "bundle" not in cfg:
              errors.append("missing top-level 'bundle' key")
          elif "name" not in cfg.get("bundle", {}):
              errors.append("missing bundle.name")
          if "targets" not in cfg:
              errors.append("missing top-level 'targets' key")
          elif "dev" not in cfg.get("targets", {}):
              errors.append("missing targets.dev")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)

          print(f"OK: bundle '{cfg['bundle']['name']}' — targets: {list(cfg['targets'].keys())}")
          EOF
