name: CI Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    name: Run smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Run smoke tests
        run: uv run python -m pytest tests/quality -v

  bundle-validate:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle (dev target)
        # Validates databricks.yml schema and variable resolution locally.
        # No deployment occurs. Dummy credentials satisfy CLI auth init.
        # Note: mode:development triggers a workspace user-identity call,
        # so the dev target intentionally omits it for offline validation.
        run: databricks bundle validate --target dev
        env:
          DATABRICKS_HOST: https://adb-placeholder.azuredatabricks.net
          DATABRICKS_TOKEN: placeholder
